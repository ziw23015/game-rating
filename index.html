<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎲 游戏吐槽鉴赏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root, [data-theme="morandi-blue"] {
  --bg: #b8c4cf;
  --bg-deep: #a2b0be;
  --card: #e9edf2;
  --card-alt: #dfe5ec;
  --cream: #f0f3f6;
  --rose: #b0a4aa;
  --rose-deep: #968a90;
  --sage: #8ea0aa;
  --sage-deep: #6e8898;
  --blue: #7e94a8;
  --blue-deep: #5e7a92;
  --mauve: #9a9aaf;
  --mauve-deep: #7e7e98;
  --warm: #a0aab8;
  --warm-deep: #8494a6;
  --text-dark: #2e3842;
  --text-mid: #4e5e6e;
  --text-light: #7e8e9a;
  --border: #c2ccd6;
  --star-on: #b8a070;
  --star-off: #c0c8d0;
  --shadow: rgba(46,56,66,0.1);
  --overlay: rgba(38,48,60,0.55);
  --header-bg: linear-gradient(160deg, #6b7e92 0%, #7e94a8 50%, #8ea0b2 100%);
  --rank-gold: #8da4b8;
  --rank-silver: #a8b8c4;
  --rank-bronze: #b0a8a0;
}

  --bg: #d4bfc4;
  --bg-deep: #c4aab2;
  --card: #f5eced;
  --card-alt: #f0e4e6;
  --cream: #faf5f5;
  --rose: #c9a0a8;
  --rose-deep: #b08088;
  --sage: #b89aa4;
  --sage-deep: #a07a88;
  --blue: #c08a96;
  --blue-deep: #a86e7e;
  --mauve: #b498a0;
  --mauve-deep: #9a7e88;
  --warm: #c4a8b0;
  --warm-deep: #b08e98;
  --text-dark: #3e2a30;
  --text-mid: #6a4e56;
  --text-light: #9a7e86;
  --border: #d8c4ca;
  --star-on: #d4a0a0;
  --star-off: #d0c4c6;
  --shadow: rgba(62,42,48,0.1);
  --overlay: rgba(50,30,38,0.55);
  --header-bg: linear-gradient(160deg, #b07882 0%, #c8909a 50%, #d4a0aa 100%);
  --rank-gold: #c08a96;
  --rank-silver: #c8a8b0;
  --rank-bronze: #b0a098;
}

[data-theme="forest"] {
  --bg: #a8b8a4;
  --bg-deep: #90a48c;
  --card: #e8ede6;
  --card-alt: #dfe6dc;
  --cream: #f2f5f0;
  --rose: #a0aa98;
  --rose-deep: #88947e;
  --sage: #8aa488;
  --sage-deep: #6e8a6c;
  --blue: #7a9878;
  --blue-deep: #5e8060;
  --mauve: #94a090;
  --mauve-deep: #7a887a;
  --warm: #a4b098;
  --warm-deep: #8a9a80;
  --text-dark: #2a3428;
  --text-mid: #4a5e46;
  --text-light: #7a8e76;
  --border: #c0ccbc;
  --star-on: #b0a870;
  --star-off: #bcc4b8;
  --shadow: rgba(42,52,40,0.1);
  --overlay: rgba(32,44,30,0.55);
  --header-bg: linear-gradient(160deg, #5a7a58 0%, #6e8e6a 50%, #80a07c 100%);
  --rank-gold: #7a9878;
  --rank-silver: #98ac96;
  --rank-bronze: #a8a090;
}

[data-theme="twilight"] {
  --bg: #beb8cc;
  --bg-deep: #a8a0be;
  --card: #edebf2;
  --card-alt: #e5e2ec;
  --cream: #f5f3f8;
  --rose: #b0a4b8;
  --rose-deep: #9688a0;
  --sage: #9a98b4;
  --sage-deep: #7e7a9e;
  --blue: #8e88a8;
  --blue-deep: #706892;
  --mauve: #a898b0;
  --mauve-deep: #8e7e98;
  --warm: #aaa4b8;
  --warm-deep: #948ca6;
  --text-dark: #302838;
  --text-mid: #504668;
  --text-light: #807498;
  --border: #cac4d6;
  --star-on: #b8a888;
  --star-off: #c4c0cc;
  --shadow: rgba(48,40,56,0.1);
  --overlay: rgba(38,28,50,0.55);
  --header-bg: linear-gradient(160deg, #6e6090 0%, #8878a4 50%, #9e90b4 100%);
  --rank-gold: #8e88a8;
  --rank-silver: #a8a4b8;
  --rank-bronze: #b0a8a0;
}

[data-theme="caramel"] {
  --bg: #c8baa8;
  --bg-deep: #b4a492;
  --card: #f0eae0;
  --card-alt: #eae2d6;
  --cream: #f8f4ee;
  --rose: #baa898;
  --rose-deep: #a08e7e;
  --sage: #aa9e8e;
  --sage-deep: #928270;
  --blue: #a89478;
  --blue-deep: #907a5e;
  --mauve: #aa9a8e;
  --mauve-deep: #907e72;
  --warm: #b8a48e;
  --warm-deep: #a28c72;
  --text-dark: #382e22;
  --text-mid: #5e4e3a;
  --text-light: #8e7e68;
  --border: #d0c4b4;
  --star-on: #c0a060;
  --star-off: #c8c0b4;
  --shadow: rgba(56,46,34,0.1);
  --overlay: rgba(46,36,24,0.55);
  --header-bg: linear-gradient(160deg, #8a7258 0%, #a08868 50%, #b09e7a 100%);
  --rank-gold: #a89478;
  --rank-silver: #b8ac9c;
  --rank-bronze: #a89888;
}

[data-theme="deep-ocean"] {
  --bg: #1e2a38;
  --bg-deep: #162230;
  --card: #283848;
  --card-alt: #2e4050;
  --cream: #c8d4e0;
  --rose: #5a6878;
  --rose-deep: #4a5868;
  --sage: #4a6478;
  --sage-deep: #3a546a;
  --blue: #4a6a88;
  --blue-deep: #3a5a78;
  --mauve: #586878;
  --mauve-deep: #485868;
  --warm: #506070;
  --warm-deep: #405060;
  --text-dark: #d0dae4;
  --text-mid: #a0b0c0;
  --text-light: #6a8098;
  --border: #384858;
  --star-on: #c0a060;
  --star-off: #4a5868;
  --shadow: rgba(10,18,28,0.3);
  --overlay: rgba(10,16,24,0.7);
  --header-bg: linear-gradient(160deg, #142030 0%, #1e3048 50%, #283a54 100%);
  --rank-gold: #4a6a88;
  --rank-silver: #506878;
  --rank-bronze: #586068;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 30% 0%, rgba(255,255,255,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 100%, rgba(0,0,0,0.06) 0%, transparent 50%);
  min-height: 100vh;
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--text-dark);
  padding-bottom: 100px;
  -webkit-tap-highlight-color: transparent;
}

/* ── HEADER ── */
header {
  background: var(--header-bg);
  padding: 28px 16px 22px;
  text-align: center;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 24px var(--shadow);
}
header h1 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 30px;
  color: var(--cream);
  letter-spacing: 6px;
  text-shadow: 0 2px 12px rgba(38,50,62,0.3);
}
header p {
  color: rgba(245,241,235,0.65);
  font-size: 11px;
  margin-top: 4px;
  letter-spacing: 2px;
  font-weight: 300;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; gap: 6px; padding: 10px 14px;
  overflow-x: auto; scrollbar-width: none;
  background: rgba(38,50,62,0.08);
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.35);
  color: var(--text-mid); font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.filter-btn.active {
  background: var(--blue);
  border-color: var(--blue);
  color: white; font-weight: 700;
}

/* ── STATS BAR ── */
.stats-bar {
  background: rgba(255,255,255,0.25);
  padding: 10px 16px;
  display: flex; gap: 14px; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--border);
}
.stat-item { text-align: center; }
.stat-num {
  font-size: 18px; font-weight: 700;
  color: var(--blue-deep);
  font-family: 'Ma Shan Zheng', cursive;
}
.stat-label { font-size: 10px; color: var(--text-light); }
.stat-divider { width: 1px; height: 26px; background: var(--border); }

/* ── PLAYERS BAR ── */
.players-bar {
  display: flex; gap: 8px; justify-content: center;
  padding: 12px 16px 8px; flex-wrap: wrap;
}
.player-chip {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--text-mid);
  background: rgba(255,255,255,0.45);
  border-radius: 20px; padding: 5px 12px;
  border: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s;
  font-weight: 500;
}
.player-chip.active {
  background: rgba(126,148,168,0.18);
  border-color: rgba(94,122,146,0.45);
  color: var(--text-dark);
}
.player-chip:active { transform: scale(0.95); background: rgba(255,255,255,0.7); }

.identity-bar {
  display: flex; gap: 8px; justify-content: center; align-items: center;
  flex-wrap: wrap; padding: 0 16px 12px;
}
.identity-current {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 20px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.42);
  font-size: 12px; color: var(--text-mid);
}
.identity-badge-label { color: var(--text-light); font-size: 11px; }
.identity-badge-name { font-weight: 700; color: var(--text-dark); }
.identity-switch-btn {
  padding: 6px 12px; border-radius: 18px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.3);
  color: var(--text-mid); font-size: 11px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
}
.identity-switch-btn:active {
  background: rgba(94,122,146,0.14);
  color: var(--blue-deep);
}

/* ── SORT BAR ── */
.sort-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  overflow-x: auto; scrollbar-width: none;
}
.sort-bar::-webkit-scrollbar { display: none; }
.sort-label {
  font-size: 11px; color: var(--text-light);
  font-weight: 500; margin-right: 2px; flex-shrink: 0;
}
.sort-btn {
  padding: 4px 10px; border-radius: 14px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.3);
  color: var(--text-mid); font-size: 11px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.sort-btn.active {
  background: var(--blue-deep);
  border-color: var(--blue-deep);
  color: white; font-weight: 700;
}

/* ── GAME CARD ── */
.game-list { padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }
.game-card {
  background: var(--card);
  border-radius: 14px;
  box-shadow: 0 2px 12px var(--shadow);
  overflow: hidden;
  border: 1px solid var(--border);
  position: relative;
}

/* Long press action bar */
.card-actions {
  position: absolute; inset: 0;
  background: rgba(46,56,66,0.85);
  backdrop-filter: blur(6px);
  border-radius: 14px;
  display: none;
  align-items: center; justify-content: center; gap: 20px;
  z-index: 10;
  animation: fadeIn 0.15s ease;
}
.card-actions.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.action-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer; color: white;
  padding: 12px 20px; border-radius: 12px;
  transition: background 0.15s;
}
.action-btn:active { background: rgba(255,255,255,0.12); }
.action-icon {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.action-icon.edit-icon { background: var(--blue); }
.action-icon.delete-icon { background: #a07070; }
.action-label { font-size: 12px; font-weight: 500; }
.action-cancel {
  position: absolute; bottom: 12px; right: 14px;
  background: none; border: none; color: rgba(255,255,255,0.6);
  font-size: 11px; cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
}

/* Edit form in modal */
.edit-form { display: flex; flex-direction: column; gap: 14px; padding: 6px 0; }
.edit-field label {
  display: block; font-size: 12px; color: var(--text-light);
  margin-bottom: 5px; font-weight: 500;
}
.edit-field input {
  width: 100%; border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  font-size: 14px; font-family: 'Noto Sans SC', sans-serif;
  background: white; color: var(--text-dark); outline: none;
}
.edit-field input:focus { border-color: var(--blue); }
.edit-save-btn {
  padding: 12px; border-radius: 12px;
  background: var(--blue); border: none;
  color: white; font-size: 14px; font-weight: 700;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; margin-top: 4px;
}
.edit-save-btn:active { background: var(--blue-deep); }
.card-header {
  display: flex; align-items: center;
  padding: 11px 14px; gap: 8px;
  border-bottom: 1px solid rgba(180,195,210,0.5);
  background: linear-gradient(135deg, var(--card) 0%, var(--card-alt) 100%);
}
.game-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--blue);
  color: white; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-family: 'Ma Shan Zheng', cursive;
}
.game-title {
  flex: 1; font-size: 15px; font-weight: 700;
  color: var(--text-dark); cursor: pointer;
}
.game-title:active { opacity: 0.6; }

/* Play status toggle */
.play-status {
  font-size: 10px; padding: 3px 8px;
  border-radius: 8px; cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 500; transition: all 0.2s;
  border: 1px solid; user-select: none; flex-shrink: 0;
}
.play-status.played {
  background: rgba(94,122,146,0.15);
  border-color: var(--blue);
  color: var(--blue-deep);
}
.play-status.unplayed {
  background: rgba(160,170,184,0.2);
  border-color: var(--warm);
  color: var(--text-light);
}

/* Avg badge */
.avg-badge {
  font-size: 13px; font-weight: 700;
  color: var(--star-on);
  font-family: 'Ma Shan Zheng', cursive;
  flex-shrink: 0;
}
.avg-badge.no-score { color: var(--star-off); font-size: 11px; font-family: 'Noto Sans SC'; font-weight: 400; }

/* Ratings grid */
.ratings-grid {
  padding: 10px 14px 12px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.player-row { display: flex; flex-direction: column; gap: 3px; }
.player-info {
  display: flex; align-items: center; gap: 4px;
}
.player-name { font-size: 11px; color: var(--text-light); font-weight: 500; }
.comment-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--warm);
  color: white; font-size: 8px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; opacity: 0.7; transition: all 0.15s;
  flex-shrink: 0; border: none;
}
.comment-dot:active { transform: scale(1.2); opacity: 1; }
.comment-dot.has { opacity: 1; background: var(--blue-deep); }

.identity-comment-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; padding: 0 14px 12px;
}
.identity-comment-hint {
  font-size: 11px; color: var(--text-light);
  line-height: 1.4;
}
.identity-comment-btn {
  flex-shrink: 0;
  padding: 6px 12px; border-radius: 16px;
  border: 1px solid rgba(94,122,146,0.25);
  background: rgba(126,148,168,0.12);
  color: var(--blue-deep); font-size: 11px; font-weight: 700;
  font-family: 'Noto Sans SC', sans-serif; cursor: pointer;
}
.identity-comment-btn:active {
  background: rgba(94,122,146,0.2);
}

.stars { display: flex; gap: 2px; }
.star {
  font-size: 22px; cursor: pointer; transition: transform 0.1s;
  line-height: 1; color: var(--star-off); user-select: none;
}
.star.on { color: var(--star-on); }
.star:active { transform: scale(1.3); }

/* ── MODAL / OVERLAY ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: var(--overlay);
  z-index: 500; display: none;
  align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--cream);
  border-radius: 18px 18px 0 0;
  width: 100%; max-width: 500px;
  max-height: 85vh;
  display: flex; flex-direction: column;
  box-shadow: 0 -4px 30px rgba(38,50,62,0.25);
  animation: slideUp 0.25s ease-out;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border); margin: 10px auto 0; flex-shrink: 0;
}
.modal-header {
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title {
  font-size: 16px; font-weight: 700; color: var(--text-dark);
  font-family: 'Ma Shan Zheng', cursive; font-size: 20px;
}
.modal-close {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(38,50,62,0.08); border: none;
  font-size: 16px; color: var(--text-mid); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-body {
  flex: 1; overflow-y: auto; padding: 14px 18px 20px;
  -webkit-overflow-scrolling: touch;
}

/* Comment thread */
.comment-item {
  display: flex; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid rgba(180,195,210,0.5);
}
.comment-item:last-child { border-bottom: none; }
.comment-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.comment-avatar.song { background: rgba(110,140,168,0.2); }
.comment-avatar.zhu { background: rgba(140,160,180,0.2); }
.comment-avatar.hui { background: rgba(120,150,178,0.2); }
.comment-avatar.xin { background: rgba(130,155,175,0.2); }
.comment-avatar.guest { background: rgba(126,148,168,0.16); color: var(--blue-deep); }

.comment-content { flex: 1; }
.comment-text { font-size: 13px; color: var(--text-dark); margin-top: 3px; line-height: 1.5; }
.comment-author-inline { font-weight: 700; color: var(--text-mid); }
.comment-time { font-size: 10px; color: var(--text-light); margin-top: 4px; }
.comment-delete {
  font-size: 10px; color: var(--rose); cursor: pointer;
  margin-left: 8px; opacity: 0.6;
}
.comment-delete:active { opacity: 1; }
.read-only-tip {
  margin-top: 14px; padding: 10px 12px;
  border-radius: 12px; border: 1px dashed var(--border);
  background: rgba(255,255,255,0.4);
  color: var(--text-light); font-size: 12px; line-height: 1.6;
}

.no-comments {
  text-align: center; color: var(--text-light);
  padding: 40px 16px; font-size: 13px;
}

/* Comment input */
.comment-input-area {
  padding: 12px 18px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
  background: rgba(255,255,255,0.5);
}
.comment-textarea {
  flex: 1; border: 1px solid var(--border);
  border-radius: 12px; padding: 8px 12px;
  font-size: 13px; font-family: 'Noto Sans SC', sans-serif;
  resize: none; background: white; color: var(--text-dark);
  min-height: 36px; max-height: 80px;
  outline: none;
}
.comment-textarea:focus { border-color: var(--blue); }
.comment-textarea::placeholder { color: var(--text-light); }
.comment-send {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--blue); border: none;
  color: white; font-size: 16px; cursor: pointer;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.comment-send:active { background: var(--blue-deep); }

/* Player profile in modal */
.profile-header {
  text-align: center; padding: 10px 0 16px;
}
.profile-emoji { font-size: 44px; }
.profile-name {
  font-size: 20px; font-weight: 700; margin-top: 4px;
  font-family: 'Ma Shan Zheng', cursive;

/* ── THEME PICKER ── */
.theme-toggle {
  position: absolute; top: 14px; right: 14px;

<body>

    <div class="identity-option-grid" id="identityOptions"></div>
    <div class="identity-guest-box">
      <div class="identity-guest-label">游客身份</div>
      <div class="identity-helper">输入一个显示名，例如「姐姐」</div>
      <input class="identity-guest-input" id="guestIdentityInput" maxlength="12" placeholder="输入游客昵称" />
      <button class="identity-guest-btn" onclick="confirmGuestIdentity()">以游客身份进入</button>
    </div>

<script>
/* ── THEME ── */
const THEME_KEY = 'bg_theme_v1';
function loadTheme() {
  const t = localStorage.getItem(THEME_KEY) || 'morandi-blue';
  applyTheme(t);
}
function applyTheme(name) {
  document.documentElement.setAttribute('data-theme', name);
  document.querySelectorAll('.theme-option').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === name);
  });
}
function setTheme(name) {
  localStorage.setItem(THEME_KEY, name);
  applyTheme(name);
  document.getElementById('themePanel').classList.remove('open');
  toast('🎨 已切换主题');
}
function toggleThemePanel() {
  document.getElementById('themePanel').classList.toggle('open');
}
// Close panel when tapping outside
document.addEventListener('click', (e) => {
  const panel = document.getElementById('themePanel');
  const btn = document.querySelector('.theme-toggle');
  if (panel && !panel.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
    panel.classList.remove('open');
  }
});
loadTheme();

/* ── DATA ── */
const PLAYERS = [
  { key:'song', name:'小宋', emoji:'🐱', bg:'song' },
  { key:'zhu',  name:'小猪', emoji:'🐷', bg:'zhu'  },
  { key:'hui',  name:'小灰', emoji:'🐯', bg:'hui'  },
  { key:'xin',  name:'小心', emoji:'💛', bg:'xin'  },
];

const IDENTITY_KEY = 'bg_identity_v1';
const GUEST_EMOJI = '👤';
const GUEST_BG = 'guest';

function makeGuestId() {
  return 'guest_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function normalizeIdentity(raw) {
  if (!raw || typeof raw !== 'object') return null;

  if (raw.type === 'fixed') {
    const player = PLAYERS.find(p => p.key === raw.playerKey);
    if (!player) return null;
    return {
      type: 'fixed',
      playerKey: player.key,
      displayName: player.name,
      authUid: typeof raw.authUid === 'string' && raw.authUid ? raw.authUid : null,
    };
  }

  if (raw.type === 'guest') {
    const displayName = typeof raw.displayName === 'string' ? raw.displayName.trim().slice(0, 12) : '';
    if (!displayName) return null;
    return {
      type: 'guest',
      displayName,
      guestId: typeof raw.guestId === 'string' && raw.guestId ? raw.guestId : makeGuestId(),
      authUid: typeof raw.authUid === 'string' && raw.authUid ? raw.authUid : null,
    };
  }

  return null;
}

function loadIdentity() {
  try {
    return normalizeIdentity(JSON.parse(localStorage.getItem(IDENTITY_KEY)));
  } catch(e) {
    return null;
  }
}

let currentIdentity = loadIdentity();

function storeIdentity(identity, options = {}) {
  const normalized = normalizeIdentity(identity);
  if (!normalized) return;

  currentIdentity = normalized;
  try {
    localStorage.setItem(IDENTITY_KEY, JSON.stringify(currentIdentity));
  } catch(e) {}

  renderIdentityBar();
  renderIdentityOptions();
  renderPlayersBar();

  if (options.refresh !== false && typeof setView === 'function') {
    setView(currentView);
  }
}

function getIdentityPlayer(identity = currentIdentity) {
  if (!identity || identity.type !== 'fixed') return null;
  return PLAYERS.find(p => p.key === identity.playerKey) || null;
}

function getIdentityLabel(identity = currentIdentity) {
  if (!identity) return '未选择';
  if (identity.type === 'fixed') {
    const player = getIdentityPlayer(identity);
    return player ? player.name : identity.displayName;
  }
  return `${identity.displayName}（游客）`;
}

function getIdentityBadgeHtml(identity = currentIdentity) {
  return `
    <span class="identity-badge-label">当前身份</span>
    <span class="identity-badge-name">${escHtml(getIdentityLabel(identity))}</span>
  `;
}

function getIdentityHeading(identity = currentIdentity) {
  if (!identity) return '未选择身份';
  if (identity.type === 'fixed') {
    const player = getIdentityPlayer(identity);
    return player ? `${player.emoji} ${player.name}` : identity.displayName;
  }
  return `${GUEST_EMOJI} ${identity.displayName}（游客）`;
}

function renderIdentityBar() {
  const el = document.getElementById('identityCurrent');
  if (!el) return;
  el.innerHTML = getIdentityBadgeHtml();
}

function renderIdentityOptions() {
  const wrap = document.getElementById('identityOptions');
  const closeBtn = document.getElementById('identityModalClose');
  if (!wrap || !closeBtn) return;

  wrap.innerHTML = PLAYERS.map(player => {
    const active = currentIdentity && currentIdentity.type === 'fixed' && currentIdentity.playerKey === player.key;
    return `
      <button class="identity-option ${active ? 'current' : ''}" onclick="selectFixedIdentity('${player.key}')">
        <div class="identity-option-emoji">${player.emoji}</div>
        <div class="identity-option-name">${player.name}</div>
        <div class="identity-option-tag">${active ? '当前使用中' : '固定身份'}</div>
      </button>
    `;
  }).join('');

  closeBtn.style.display = currentIdentity ? 'flex' : 'none';
}

function openIdentityModal(prefillCurrent = false) {
  renderIdentityOptions();
  const overlay = document.getElementById('identityOverlay');
  const input = document.getElementById('guestIdentityInput');
  if (input) {
    input.value = prefillCurrent && currentIdentity && currentIdentity.type === 'guest'
      ? currentIdentity.displayName
      : '';
  }
  overlay.classList.add('open');
}

function closeIdentityModal() {
  if (!currentIdentity) return;
  document.getElementById('identityOverlay').classList.remove('open');
}

function closeIdentityModalOutside(e) {
  if (e.target === e.currentTarget) closeIdentityModal();
}

function selectFixedIdentity(playerKey) {
  const player = PLAYERS.find(p => p.key === playerKey);
  if (!player) return;

  storeIdentity({
    type: 'fixed',
    playerKey: player.key,
    displayName: player.name,
    authUid: window.currentAuthUid || (currentIdentity && currentIdentity.authUid) || null,
  });
  closeIdentityModal();
  toast(`当前身份：${player.name}`);
}

function confirmGuestIdentity() {
  const input = document.getElementById('guestIdentityInput');
  const displayName = input.value.trim().slice(0, 12);
  if (!displayName) {
    toast('请输入游客昵称');
    input.focus();
    return;
  }

  const guestId = currentIdentity && currentIdentity.type === 'guest'
    ? currentIdentity.guestId
    : makeGuestId();

  storeIdentity({
    type: 'guest',
    displayName,
    guestId,
    authUid: window.currentAuthUid || (currentIdentity && currentIdentity.authUid) || null,
  });
  closeIdentityModal();
  toast(`当前身份：${displayName}（游客）`);
}

function attachIdentityAuthUid(uid) {
  if (!uid || !currentIdentity || currentIdentity.authUid === uid) return;
  storeIdentity({ ...currentIdentity, authUid: uid }, { refresh: false });
}

function getCommentBucketKeyForIdentity(gid, identity = currentIdentity) {
  if (!identity) return null;
  if (identity.type === 'fixed') return `${gid}_${identity.playerKey}`;
  return `${gid}_guest_${identity.guestId}`;
}

function getCommentsForBucket(bucketKey) {
  if (!bucketKey) return [];
  const comments = D && D.comments ? D.comments[bucketKey] : null;
  return Array.isArray(comments) ? comments : [];
}

function getCommentCountForIdentity(gid, identity = currentIdentity) {
  const bucketKey = getCommentBucketKeyForIdentity(gid, identity);
  return bucketKey ? getCommentsForBucket(bucketKey).length : 0;
}

function getCommentTimestamp(comment) {
  return Number(comment && (comment.createdAt ?? comment.ts) || 0);
}

function getCommentAuthorMeta(comment, bucketKey) {
  const playerKey = comment && (comment.playerKey || comment.authorKey);
  if (playerKey) {
    const player = PLAYERS.find(p => p.key === playerKey);
    if (player) {
      return { label: player.name, emoji: player.emoji, bg: player.bg };
    }
  }

  const isGuest = !!(comment && (comment.isGuest === true || comment.role === 'guest' || comment.authorType === 'guest'));
  if (isGuest) {
    const guestName = comment.displayName || comment.authorName || '游客';
    return { label: `${guestName}（游客）`, emoji: GUEST_EMOJI, bg: GUEST_BG };
  }

  const parts = bucketKey.split('_');
  const bucketPlayerKey = parts[1];
  const player = PLAYERS.find(p => p.key === bucketPlayerKey);
  if (player) {
    return { label: player.name, emoji: player.emoji, bg: player.bg };
  }

  return { label: '游客', emoji: GUEST_EMOJI, bg: GUEST_BG };
}

function canCurrentIdentityDeleteComment(comment, bucketKey) {
  if (!currentIdentity) return false;

  const commentPlayerKey = comment && (comment.playerKey || comment.authorKey);
  const isGuest = !!(comment && (comment.isGuest === true || comment.role === 'guest' || comment.authorType === 'guest'));
  const ownerUid = comment && (comment.uid || comment.authorUid);
  const ownerGuestId = comment && (comment.guestId || comment.authorGuestId);

  if (currentIdentity.type === 'guest') {
    if (!isGuest && !(bucketKey && bucketKey.includes('_guest_'))) return false;
    if (ownerGuestId && currentIdentity.guestId === ownerGuestId) return true;
    if (ownerUid && currentIdentity.authUid && ownerUid === currentIdentity.authUid) return true;
    return !!(bucketKey && currentIdentity.guestId && bucketKey.includes(`_guest_${currentIdentity.guestId}`) && !commentPlayerKey);
  }

  if (commentPlayerKey) return commentPlayerKey === currentIdentity.playerKey;
  if (isGuest) return false;

  const parts = bucketKey.split('_');
  return parts[1] === currentIdentity.playerKey;
}

function renderCommentItem(comment, bucketKey) {
  const meta = getCommentAuthorMeta(comment, bucketKey);
  const timestamp = getCommentTimestamp(comment);
  const deleteHtml = canCurrentIdentityDeleteComment(comment, bucketKey)
    ? `<span class="comment-delete" onclick="deleteComment('${bucketKey}',${timestamp})">删除</span>`
    : '';
  return `
    <div class="comment-item">
      <div class="comment-avatar ${meta.bg}">${meta.emoji}</div>
      <div class="comment-content">
        <div class="comment-text"><span class="comment-author-inline">${escHtml(meta.label)}：</span>${escHtml(comment && comment.text)}</div>
        <span class="comment-time">${fmtTime(timestamp)}
          ${deleteHtml}
        </span>
      </div>
    </div>
  `;
}

function openCommentBucket(gid, bucketKey, options = {}) {
  const game = allGames().find(g => g.id === gid);
  if (!game) return;

  modalCtx = { type:'comment', gameId: gid, bucketKey, options };
  document.getElementById('modalTitle').textContent = options.title || `💬 ${game.title} 吐槽`;

  const comments = getCommentsForBucket(bucketKey);
  const body = document.getElementById('modalBody');
  let html = '';

  if (!comments.length) {
    html = `<div class="no-comments">${options.emptyText || '还没有吐槽，写一条吧！'}</div>`;
  } else {
    html = comments.slice().reverse().map(comment => renderCommentItem(comment, bucketKey)).join('');
  }

  if (!options.allowInput && options.readOnlyHint) {
    html += `<div class="read-only-tip">${escHtml(options.readOnlyHint)}</div>`;
  }
  body.innerHTML = html;

  const area = document.getElementById('commentInputArea');
  const textarea = document.getElementById('commentTextarea');
  if (options.allowInput) {
    area.style.display = 'flex';
    textarea.value = '';
    textarea.placeholder = options.placeholder || '说点什么…';
  } else {
    area.style.display = 'none';
  }

  openModal();
}

function buildCommentPayload(text) {
  const createdAt = Date.now();
  if (!currentIdentity) return { text, createdAt, ts: createdAt };

  if (currentIdentity.type === 'fixed') {
    const player = getIdentityPlayer(currentIdentity);
    return {
      text,
      createdAt,
      ts: createdAt,
      displayName: player ? player.name : currentIdentity.displayName,
      playerKey: player ? player.key : currentIdentity.playerKey,
      role: 'fixed',
      isGuest: false,
      uid: currentIdentity.authUid || null,
      authorType: 'fixed',
      authorKey: player ? player.key : currentIdentity.playerKey,
      authorName: player ? player.name : currentIdentity.displayName,
      authorEmoji: player ? player.emoji : '',
      authorBg: player ? player.bg : '',
      authorUid: currentIdentity.authUid || null,
    };
  }

  return {
    text,
    createdAt,
    ts: createdAt,
    displayName: currentIdentity.displayName,
    role: 'guest',
    isGuest: true,
    uid: currentIdentity.authUid || null,
    guestId: currentIdentity.guestId,
    authorType: 'guest',
    authorName: currentIdentity.displayName,
    authorEmoji: GUEST_EMOJI,
    authorBg: GUEST_BG,
    authorGuestId: currentIdentity.guestId,
    authorUid: currentIdentity.authUid || null,
  };
}

const SK = 'bg_app_v3';

function normalizeData(d = {}) {
  if (!d || typeof d !== 'object') d = {};
  if (!D_SAFE_OBJECT(d.ratings)) d.ratings = {};
  if (!D_SAFE_OBJECT(d.status)) d.status = {};
  if (!D_SAFE_OBJECT(d.comments)) d.comments = {};
  if (!Array.isArray(d.customGames)) d.customGames = [];
  if (!Array.isArray(d.deleted)) d.deleted = [];
  if (!D_SAFE_OBJECT(d.edits)) d.edits = {};
  return d;
}

function D_SAFE_OBJECT(x) {
  return x && typeof x === 'object' && !Array.isArray(x);
}

function load() {
  try {
    return normalizeData(JSON.parse(localStorage.getItem(SK)) || {});
  } catch(e) {
    return normalizeData({});
  }
}

function save(d) {
  d = normalizeData(d);

  // Keep a local backup on this device.
  try {
    localStorage.setItem(SK, JSON.stringify(d));
  } catch(e) {}

  // If Firebase is ready, also save to the shared cloud database.
  if (window.firebaseSet && window.firebaseDataRef) {
    window.firebaseSet(window.firebaseDataRef, d)
      .catch(err => console.error('Firebase save failed:', err));
  }
}

function allGames() {

    .map(g => {
      const e = (D.edits||{})[g.id];
      if (e) return { ...g, title: e.title ?? g.title, tag: e.tag ?? g.tag };
      return g;
    });
}

/* ── HELPERS ── */
function gameAvg(gid) {
  const sc = PLAYERS.map(p => D.ratings[gid+'_'+p.key]).filter(v=>v&&v>0);
  return sc.length ? sc.reduce((a,b)=>a+b,0)/sc.length : null;
}

function fmtTime(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function compareDefaultOrder(a, b, orderMap) {
  return (orderMap.get(a.id) ?? 0) - (orderMap.get(b.id) ?? 0);
}

function compareTitleThenDefault(a, b, orderMap) {
  const cmp = a.title.localeCompare(b.title, 'zh-CN');
  return cmp || compareDefaultOrder(a, b, orderMap);
}

function statusSortRank(gid, targetStatus) {
  const hasStatus = Object.prototype.hasOwnProperty.call(D.status || {}, gid);
  if (hasStatus && D.status[gid] === targetStatus) return 0;
  if (!hasStatus) return 2;
  return 1;
}

/* ── RENDER GAME CARDS ── */
function renderGames(filter) {
  const list = document.getElementById('gameList');
  list.innerHTML = '';
  let games = allGames();
  const defaultOrder = new Map(games.map((g, idx) => [g.id, idx]));

  if (filter === 'unrated') games = games.filter(g => PLAYERS.every(p => !D.ratings[g.id+'_'+p.key]));
  else if (filter === 'rated') games = games.filter(g => PLAYERS.some(p => D.ratings[g.id+'_'+p.key]));

  // Apply sort
  if (currentSort === 'az') {
    games.sort((a,b) => compareTitleThenDefault(a, b, defaultOrder));
  } else if (currentSort === 'high') {
    games.sort((a,b) => {
      const aa = gameAvg(a.id), bb = gameAvg(b.id);
      if (aa === null && bb === null) return 0;
      if (aa === null) return 1;
      if (bb === null) return -1;
      return bb - aa;
    });
  } else if (currentSort === 'low') {
    games.sort((a,b) => {
      const aa = gameAvg(a.id), bb = gameAvg(b.id);
      if (aa === null && bb === null) return 0;
      if (aa === null) return 1;
      if (bb === null) return -1;
      return aa - bb;
    });
  } else if (currentSort === 'played_first') {
    games.sort((a,b) => {
      const ra = statusSortRank(a.id, 'played');
      const rb = statusSortRank(b.id, 'played');
      if (ra !== rb) return ra - rb;
      return compareTitleThenDefault(a, b, defaultOrder);
    });
  } else if (currentSort === 'unopened_first') {
    games.sort((a,b) => {
      const ra = statusSortRank(a.id, 'unplayed');
      const rb = statusSortRank(b.id, 'unplayed');
      if (ra !== rb) return ra - rb;
      return compareTitleThenDefault(a, b, defaultOrder);
    });
  }

  if (!games.length) {
    list.innerHTML = `<div style="text-align:center;color:var(--text-light);padding:50px 16px;font-size:13px;">暂无游戏 🎲</div>`;
    return;
  }

  games.forEach((g, idx) => {
    const card = document.createElement('div');
    card.className = 'game-card';

    const avg = gameAvg(g.id);
    const status = D.status[g.id] || 'unplayed';
    const statusLabel = status === 'played' ? '已玩' : '未开';
    const statusClass = status === 'played' ? 'played' : 'unplayed';
    const identityLabel = currentIdentity ? `当前身份：${getIdentityLabel()}` : '先选择身份再写吐槽';
    const identityCommentCount = currentIdentity ? getCommentCountForIdentity(g.id) : 0;
    const identityButtonLabel = currentIdentity
      ? `当前身份吐槽${identityCommentCount ? ` · ${identityCommentCount}` : ''}`
      : '选择身份后吐槽';

    const tagHtml = g.tag ? `<span style="font-size:10px;color:var(--text-light);background:rgba(0,0,0,0.04);border-radius:6px;padding:2px 6px;border:1px solid var(--border);">${g.tag}</span>` : '';

    let headerHTML = `
      <div class="card-header">
        <div class="game-num">${idx+1}</div>
        <div class="game-title" onclick="openGameThread('${g.id}')">${g.title}</div>
        ${tagHtml}
        <span class="play-status ${statusClass}" onclick="toggleStatus('${g.id}',this)">${statusLabel}</span>
        <span class="avg-badge ${avg===null?'no-score':''}">${avg===null?'待评':'★'+avg.toFixed(1)}</span>
      </div>
    `;

    let gridHTML = '<div class="ratings-grid">';
    PLAYERS.forEach(p => {
      const val = D.ratings[g.id+'_'+p.key] || 0;
      const cmts = (D.comments[g.id+'_'+p.key] || []);
      const hasCmt = cmts.length > 0;
      gridHTML += `
        <div class="player-row">
          <div class="player-info">
            <span class="player-name">${p.emoji} ${p.name}</span>
            <button class="comment-dot ${hasCmt?'has':''}" onclick="openCommentInput('${g.id}','${p.key}')"
              title="写吐槽">${hasCmt ? cmts.length : '＋'}</button>
          </div>
          <div class="stars">
            ${[1,2,3,4,5].map(i =>
              `<span class="star ${i<=val?'on':''}" onclick="rate('${g.id}','${p.key}',${i})">★</span>`
            ).join('')}
          </div>
        </div>
      `;
    });
    gridHTML += '</div>';

    card.innerHTML = headerHTML + gridHTML + `
      <div class="identity-comment-row">
        <span class="identity-comment-hint">${escHtml(identityLabel)}</span>
        <button class="identity-comment-btn" onclick="openIdentityCommentInput('${g.id}')">${identityButtonLabel}</button>
      </div>
      <div class="card-actions" id="actions_${g.id}">
        <button class="action-btn" onclick="openEditGame('${g.id}')">
          <div class="action-icon edit-icon">✏️</div>
          <span class="action-label">编辑</span>
        </button>
        <button class="action-btn" onclick="deleteGame('${g.id}')">
          <div class="action-icon delete-icon">🗑️</div>
          <span class="action-label">删除</span>
        </button>
        <button class="action-cancel" onclick="hideActions('${g.id}')">取消</button>
      </div>
    `;

    // Long press handler
    let lpTimer = null;
    const startLP = (e) => {
      lpTimer = setTimeout(() => {
        lpTimer = null;
        document.getElementById('actions_'+g.id).classList.add('show');
        if (navigator.vibrate) navigator.vibrate(30);
      }, 500);
    };
    const cancelLP = () => { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } };
    card.addEventListener('touchstart', startLP, {passive:true});
    card.addEventListener('touchend', cancelLP);
    card.addEventListener('touchmove', cancelLP);
    // Desktop: right-click or long mousedown
    card.addEventListener('mousedown', startLP);
    card.addEventListener('mouseup', cancelLP);
    card.addEventListener('mouseleave', cancelLP);
    card.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      document.getElementById('actions_'+g.id).classList.add('show');
    });

    list.appendChild(card);
  });
}

/* ── RATE ── */
function rate(gid, pkey, val) {
  if (!currentIdentity) {
    openIdentityModal();
    return;
  }
  if (currentIdentity.type === 'guest') {
    toast('游客不能评分，请切换为固定身份');
    return;
  }
  if (currentIdentity.playerKey !== pkey) {
    toast('只能修改当前身份的评分');
    return;
  }
  const key = gid+'_'+pkey;
  const current = Number(D.ratings[key] || 0);
  if (current === val) {
    delete D.ratings[key];
    save(D); setView(currentView);
    toast('已清除评分');
    return;
  }
  D.ratings[key] = val;
  save(D); setView(currentView);
  toast(`${PLAYERS.find(p=>p.key===pkey).emoji} ${val} ★`);
}

/* ── TOGGLE STATUS ── */
function toggleStatus(gid, el) {
  const cur = D.status[gid] || 'unplayed';
  const next = cur === 'played' ? 'unplayed' : 'played';
  D.status[gid] = next; save(D);
  el.textContent = next === 'played' ? '已玩' : '未开';
  el.className = 'play-status ' + (next === 'played' ? 'played' : 'unplayed');
  toast(next === 'played' ? '✅ 已玩' : '📦 未开');
}

/* ── CARD ACTIONS (edit / delete) ── */
function hideActions(gid) {
  const el = document.getElementById('actions_'+gid);
  if (el) el.classList.remove('show');
}

function deleteGame(gid) {
  const game = allGames().find(g=>g.id===gid);
  if (!game) return;
  if (!confirm(`确定要永久删除「${game.title}」吗？\n所有评分和吐槽都会一起删除。`)) {
    hideActions(gid); return;
  }
  // Mark as deleted
  if (!D.deleted) D.deleted = [];
  D.deleted.push(gid);
  // If custom game, also remove from array
  if (gid.startsWith('c')) {
    const idx = parseInt(gid.substring(1));
    if (D.customGames && D.customGames[idx]) D.customGames.splice(idx, 1);
  }
  // Clean up associated data
  PLAYERS.forEach(p => {
    delete D.ratings[gid+'_'+p.key];
  });
  Object.keys(D.comments || {}).forEach(key => {
    if (key.startsWith(gid + '_')) delete D.comments[key];
  });
  delete D.status[gid];
  delete (D.edits||{})[gid];
  save(D);
  setView(currentView);
  toast('🗑️ 已删除「' + game.title + '」');
}

function openEditGame(gid) {
  hideActions(gid);
  const game = allGames().find(g=>g.id===gid);
  if (!game) return;
  modalCtx = { type:'edit', gameId:gid };
  document.getElementById('modalTitle').textContent = '✏️ 编辑游戏';
  document.getElementById('commentInputArea').style.display = 'none';
  document.getElementById('modalBody').innerHTML = `
    <div class="edit-form">
      <div class="edit-field">
        <label>游戏名称</label>
        <input id="editNameInput" value="${escHtml(game.title)}" placeholder="输入游戏名称" />
      </div>
      <div class="edit-field">
        <label>标注（如"带扩"、"缺配件"，可留空）</label>
        <input id="editTagInput" value="${escHtml(game.tag)}" placeholder="可选标注" />
      </div>
      <button class="edit-save-btn" onclick="saveEditGame()">保存修改</button>
    </div>
  `;
  openModal();
}

function saveEditGame() {
  if (!modalCtx || modalCtx.type !== 'edit') return;
  const gid = modalCtx.gameId;
  const newName = document.getElementById('editNameInput').value.trim();
  if (!newName) { toast('名称不能为空'); return; }
  const newTag = document.getElementById('editTagInput').value.trim();

  // For custom games, update directly
  if (gid.startsWith('c')) {
    const idx = parseInt(gid.substring(1));
    if (D.customGames && D.customGames[idx]) {
      D.customGames[idx].title = newName;
      D.customGames[idx].tag = newTag;
    }
  }
  // Store edits (works for both default and custom)
  if (!D.edits) D.edits = {};
  D.edits[gid] = { title: newName, tag: newTag };
  save(D);
  closeModal();
  setView(currentView);
  toast('✅ 已保存修改');
}

/* ── MODAL ── */
function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); modalCtx = null; }
function closeModalOutside(e) { if (e.target === e.currentTarget) closeModal(); }

/* ── GAME THREAD (Reddit-style all comments) ── */
function openGameThread(gid) {
  const game = allGames().find(g=>g.id===gid);
  if (!game) return;
  modalCtx = { type:'thread', gameId:gid };
  document.getElementById('modalTitle').textContent = '💬 ' + game.title + ' 吐槽区';

  const body = document.getElementById('modalBody');
  let allCmts = [];
  Object.entries(D.comments || {}).forEach(([bucketKey, comments]) => {
    if (!bucketKey.startsWith(gid + '_') || !Array.isArray(comments)) return;
    comments.forEach(comment => {
      allCmts.push({ ...comment, bucketKey });
    });
  });
  allCmts.sort((a,b) => getCommentTimestamp(b) - getCommentTimestamp(a));

  if (!allCmts.length) {
    body.innerHTML = `<div class="no-comments">还没有人吐槽过这个游戏<br>点卡片下方的「当前身份吐槽」开始吐槽吧</div>`;
  } else {
    body.innerHTML = allCmts.map(c => renderCommentItem(c, c.bucketKey)).join('');
  }

  const area = document.getElementById('commentInputArea');
  const textarea = document.getElementById('commentTextarea');
  if (currentIdentity) {
    area.style.display = 'flex';
    textarea.value = '';
    textarea.placeholder = `以${getIdentityLabel()}身份说点什么…`;
  } else {
    area.style.display = 'none';
  }
  openModal();
}

function openIdentityCommentInput(gid) {
  const game = allGames().find(g => g.id === gid);
  if (!game) return;

  if (!currentIdentity) {
    openIdentityModal();
    return;

  openCommentBucket(gid, getCommentBucketKeyForIdentity(gid), {
    title: `${getIdentityHeading()} 对 ${game.title} 的吐槽`,

}

  });

function submitComment() {
  if (!modalCtx || (modalCtx.type !== 'comment' && modalCtx.type !== 'thread')) return;
  if (modalCtx.type === 'comment' && (!modalCtx.options || !modalCtx.options.allowInput)) return;
  if (!currentIdentity) {
    openIdentityModal();
    return;
  }
  const text = document.getElementById('commentTextarea').value.trim();
  if (!text) return;
  const key = modalCtx.type === 'comment'
    ? modalCtx.bucketKey
    : getCommentBucketKeyForIdentity(modalCtx.gameId);
  if (!key) return;
  if (!D.comments[key]) D.comments[key] = [];
  D.comments[key].push(buildCommentPayload(text));
  save(D);
  if (modalCtx.type === 'comment') {
    openCommentBucket(modalCtx.gameId, modalCtx.bucketKey, modalCtx.options);
  } else {
    openGameThread(modalCtx.gameId);
  }
  setView(currentView);
  toast('💬 吐槽成功');
}

function deleteComment(key, ts) {
  D.comments[key] = (D.comments[key]||[]).filter(c => getCommentTimestamp(c) !== ts);
  if (!D.comments[key].length) delete D.comments[key];
  save(D);
  // refresh the current modal
  if (modalCtx) {
    if (modalCtx.type === 'comment') openCommentBucket(modalCtx.gameId, modalCtx.bucketKey, modalCtx.options);
    else if (modalCtx.type === 'thread') openGameThread(modalCtx.gameId);
  }
  setView(currentView);
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

/* ── PLAYER PROFILE ── */
function openPlayerProfile(pkey) {
  const player = PLAYERS.find(p=>p.key===pkey);
  if (!player) return;
  modalCtx = { type:'profile', playerKey:pkey };
  document.getElementById('modalTitle').textContent = player.emoji + ' ' + player.name + ' 的桌游评分';
  document.getElementById('commentInputArea').style.display = 'none';

  const games = allGames();
  const rated = games.map(g => ({
    title: g.title, tag: g.tag,
    score: D.ratings[g.id+'_'+pkey] || 0
  }));

  const scored = rated.filter(r=>r.score>0).sort((a,b)=>b.score-a.score);
  const unscored = rated.filter(r=>r.score===0);

  const totalRated = scored.length;
  const avgScore = totalRated ? (scored.reduce((a,b)=>a+b.score,0)/totalRated).toFixed(1) : '—';

  let html = `
    <div class="profile-header">
      <div class="profile-emoji">${player.emoji}</div>
      <div class="profile-name">${player.name}</div>
      <div class="profile-stat">已评 ${totalRated}/${games.length} 款 · 平均 ${avgScore} ★</div>
    </div>
  `;

  if (scored.length) {
    html += `<div class="profile-section-label">— 已评分（高 → 低）—</div>`;
    scored.forEach((r, i) => {
      html += `
        <div class="profile-game-item">
          <div class="profile-game-rank">${i+1}</div>
          <div class="profile-game-name">${r.title}${r.tag?' <span style="font-size:10px;color:var(--text-light);">('+r.tag+')</span>':''}</div>
          <div class="profile-game-stars">
            ${[1,2,3,4,5].map(s=>`<span class="${s<=r.score?'on':''}">★</span>`).join('')}
          </div>
        </div>
      `;
    });
  }

  if (unscored.length) {
    html += `<div class="profile-section-label">— 未评分 —</div>`;
    unscored.forEach(r => {
      html += `
        <div class="profile-game-item">
          <div class="profile-game-rank">-</div>
          <div class="profile-game-name" style="color:var(--text-light);">${r.title}</div>
          <div class="profile-game-stars" style="opacity:0.3;">★★★★★</div>
        </div>
      `;
    });
  }

  document.getElementById('modalBody').innerHTML = html;
  openModal();
}

/* ── ADD GAME ── */
function addGame() {
  const input = document.getElementById('newGameInput');
  const name = input.value.trim();
  if (!name) { toast('请输入游戏名称'); return; }
  if (!D.customGames) D.customGames = [];
  D.customGames.push({ title: name, tag: '' });
  save(D); input.value = '';
  setView(currentView);
  toast('🎲 已添加「' + name + '」');
}

/* ── RANKING ── */
function renderRanking() {
  const container = document.getElementById('rankingView');
  container.innerHTML = '';
  const games = allGames();
  const scored = games.map(g=>({...g, avg:gameAvg(g.id), scores:PLAYERS.map(p=>({...p,val:D.ratings[g.id+'_'+p.key]||0}))}))
    .filter(g=>g.avg!==null).sort((a,b)=>b.avg-a.avg);

  if (!scored.length) {
    container.innerHTML = `<div style="text-align:center;color:var(--text-light);padding:60px 16px;font-size:13px;">还没有评分记录<br>快去评分吧 🎲</div>`;
    return;
  }

  scored.forEach((g,i)=>{
    const pc = i===0?'gold':i===1?'silver':i===2?'bronze':'normal';
    const ss = g.scores.filter(s=>s.val>0).map(s=>`${s.emoji}${s.val}★`).join('  ');
    const el = document.createElement('div');
    el.className = 'rank-item';
    el.innerHTML = `
      <div class="rank-pos ${pc}">${i+1}</div>
      <div class="rank-info">
        <div class="rank-title">${g.title}</div>
        <div class="rank-scores">${ss}</div>
      </div>
      <div class="rank-avg">★${g.avg.toFixed(1)}</div>
    `;
    container.appendChild(el);
  });

  const unscored = games.filter(g=>gameAvg(g.id)===null);
  if (unscored.length) {
    const d = document.createElement('div');
    d.style.cssText = 'text-align:center;color:var(--text-light);font-size:12px;padding:14px 8px;';
    d.textContent = `还有 ${unscored.length} 款游戏未评分`;
    container.appendChild(d);
  }
}

/* ── STATS ── */
function updateStats() {
  const games = allGames();
  document.getElementById('sTotal').textContent = games.length;
  const rated = games.filter(g=>PLAYERS.some(p=>D.ratings[g.id+'_'+p.key]));
  document.getElementById('sRated').textContent = rated.length;
  const avgs = games.map(g=>gameAvg(g.id)).filter(v=>v!==null);
  if (avgs.length) {
    document.getElementById('sTop').textContent = Math.max(...avgs).toFixed(1);
    document.getElementById('sAvg').textContent = (avgs.reduce((a,b)=>a+b,0)/avgs.length).toFixed(1);
  } else {
    document.getElementById('sTop').textContent = '—';
    document.getElementById('sAvg').textContent = '—';
  }
}

/* ── VIEW ── */
function setView(view) {
  currentView = view;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  const gv = document.getElementById('gameView');
  const rv = document.getElementById('rankingView');
  if (view === 'ranked') {
    gv.classList.add('hidden'); rv.classList.add('active');
    renderRanking();
  } else {
    gv.classList.remove('hidden'); rv.classList.remove('active');
    renderGames(view);
  }
  updateStats();
}

document.querySelectorAll('.filter-btn').forEach(b => {
  b.addEventListener('click', () => setView(b.dataset.view));
});

document.querySelectorAll('.sort-btn').forEach(b => {
  b.addEventListener('click', () => {
    currentSort = b.dataset.sort;
    document.querySelectorAll('.sort-btn').forEach(s => s.classList.toggle('active', s.dataset.sort === currentSort));
    setView(currentView);
  });
});

document.getElementById('guestIdentityInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    confirmGuestIdentity();
  }
});

/* ── RESET ── */
function confirmReset() {
  if (confirm('确定要清空所有评分、吐槽、自建游戏吗？\n此操作不可恢复。')) {
    D = { ratings:{}, status:{}, comments:{}, customGames:[], deleted:[], edits:{} };
    save(D); setView('all'); toast('已清空所有数据');
  }
}

/* ── INIT ── */
renderIdentityBar();
renderIdentityOptions();
renderPlayersBar();
setView('all');
if (!currentIdentity) openIdentityModal();
</script>
